chunking:
  chunk_size: 512
  overlap_tokens: 50
  include_header_path: true

embedding:
  device: "cuda"
  model_dim: 768
  token_limit: 512
  dense:
    model_name: "BAAI/bge-base-en-v1.5"
    batch_size: 32
    use_fp16: true
    show_progress_bar: false
  sparse:
    model_name: "prithivida/Splade_PP_en_v1"
    batch_size: 8
    threads: 4

qdrant:
  url: "http://localhost:6333"
  distance_metric: "Cosine"
  grpc_port: 6334
  storage_batch_size: 500

reranker:
  model_name: "BAAI/bge-reranker-v2-m3"
  device: "cpu"
  batch_size: 32
  enabled: true

llm:
  model: "llama3.2"
  temperature: 0.1
  max_tokens: 1000

compression:
  model_name: "microsoft/llmlingua-2-bert-base-multilingual-cased-meetingbank"
  compression_ratio: 0.5
  token_limit: null
  device: "cpu"

research:
  postgres:
    host: "localhost"
    port: 5432
    database: "bwired_research"
    user: "bwired"
    password: "bwired"

  searxng:
    url: "http://localhost:8080"
    timeout: 30
    max_results_per_query: 10

  crawling:
    max_urls_per_domain: 5
    relevance_threshold: 50
    timeout: 30
    user_agent: "BwiredResearchBot/1.0"

  extraction:
    batch_size: 5
    confidence_threshold: 0.7
    retrieval_top_k: 10
    llm:
      provider: "ollama"  # "ollama" or "openai"
      ollama:
        base_url: "http://localhost:11434"
        model: "llama3.2"
        timeout: 120
      openai:
        api_key: ""  # Set via OPENAI_API_KEY env var
        model: "gpt-4o-mini"
        timeout: 120

  synthesis:
    max_facts_per_section: 20
    min_confidence: 0.7
    include_citations: true
    report_format: "markdown"
    citation_format: "url"
    llm:
      provider: "ollama"
      ollama:
        base_url: "http://localhost:11434"
        model: "llama3.2"
        timeout: 180
      openai:
        api_key: ""
        model: "gpt-4o"
        timeout: 180

  max_concurrent_sessions: 5